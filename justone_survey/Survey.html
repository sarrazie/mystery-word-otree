<style>
    .otree-timer {
        display: none;

</style>

<script>
  document.addEventListener("DOMContentLoaded", function (event) {
      $('.otree-timer__time-left').on('update.countdown', function (event) {
          if (event.offset.totalSeconds === 15) {
              $('.otree-timer').show();
          }
      });
  });
</script>
